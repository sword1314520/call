<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>催收场景AI助手 - POC演示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Helvetica Neue', 'Arial', 'sans-serif';
            background-color: #f0f2f5;
        }

        .highlight {
            background-color: #fef9c3;
            transition: background-color 0.3s ease;
        }

        .evidence-highlight {
            background-color: #fecaca;
            border-left: 3px solid #ef4444;
            padding-left: 5px;
            transition: all 0.3s ease;
        }

        .emotion-bar {
            transition: all 0.2s ease-in-out;
        }

        .sidebar-item {
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            border-left: 4px solid transparent;
        }

        .sidebar-item:hover {
            background-color: #f3f4f6;
        }

        .sidebar-item-active {
            background-color: #eef2ff;
            border-left-color: #4f46e5;
        }

        .modified {
            background-color: #fef3c7;
            padding: 2px 4px;
            border-radius: 4px;
            position: relative;
        }

        .modified-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #f59e0b;
            border-radius: 50%;
            margin-left: 4px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }

        .toast {
            visibility: hidden;
            min-width: 250px;
            margin-left: -125px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 2px;
            padding: 16px;
            position: fixed;
            z-index: 100;
            left: 50%;
            bottom: 30px;
            font-size: 17px;
            opacity: 0;
            transition: opacity 0.3s, visibility 0.3s, bottom 0.3s;
        }

        .toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }

        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.5);
        }

        .tab-button {
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-button:hover {
            background-color: #f3f4f6;
        }

        .tab-button-active {
            border-bottom-color: #4f46e5;
            color: #4f46e5;
            font-weight: 600;
        }

        .role-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
    </style>
</head>

<body class="antialiased text-gray-800">

    <div id="app" class="flex h-screen bg-gray-100">
        <!-- Sidebar -->
        <aside class="w-72 bg-white flex-shrink-0 border-r border-gray-200 flex flex-col">
            <div class="h-16 flex items-center justify-center border-b border-gray-200">
                <h1 class="text-xl font-bold text-indigo-600">催收场景AI助手 - POC演示</h1>
            </div>

            <!-- Role Selector -->
            <div class="p-4 border-b border-gray-200">
                <label class="text-sm font-medium text-gray-600 mb-2 block">当前角色</label>
                <select id="role-selector"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="agent">催收坐席</option>
                    <option value="supervisor">催收主管</option>
                    <option value="analyst">数据分析师</option>
                    <option value="admin">系统管理员</option>

            </div>

            <nav class="flex-1 p-3 space-y-2 overflow-y-auto" id="sidebar-content">
                <!-- Content will be dynamically loaded based on role -->
            </nav>

            <div class="p-4 border-t border-gray-200">
                <div class="p-4 bg-indigo-50 rounded-lg text-center">
                    <p class="text-sm font-medium text-indigo-800">用户: <span id="current-user-name">演示用户</span></p>
                    <p class="text-xs text-indigo-500 mt-1">演示模式</p>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden" id="main-content">
            <!-- Content will be dynamically loaded based on role -->
        </main>
    </div>

    <!-- Appeal Modal -->
    <div id="appeal-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden z-50">

            <div class="mt-3">

                    <svg class="h-6 w-6 text-yellow-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

                    </svg>

                <div class="mt-4 px-7 py-3">
                    <p class="text-sm text-gray-600 mb-2">违规项: <span id="appeal-rule-name" class="font-semibold"></span>

                    <p class="text-sm text-gray-600 mb-4">扣分: <span id="appeal-penalty"

    <!-- Suggestion Modal -->
    <div id="suggestion-modal"
        class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden z-50">

        </div>
    </div>

    <div id="toast-notification" class="toast"></div>

                    ]
                },
                'defect': {
                    caseInfo: {
                        id: 'CASE-20250116-003',

                        duration: 36,
                    },

                        { speaker: '坐席', text: '你有一笔1500元的账单逾期了,打算什么时候还?', start: 15, end: 20 },
                        { speaker: '客户', text: '唉,知道了,这周吧,这周肯定还。', start: 21, end: 26 },

            // 记录哪些案件来自后端数据库，前端渲染时会优先展示它们

            // Tag Library (Knowledge Base)
            const TAG_LIBRARY = {
                "通话状态": ["可联", "无人接听", "拒接", "空号", "停机"],
                "承诺还款": ["是", "否", "是 (模糊)"],

                "投诉倾向": ["无", "低", "中", "高"],
                "风险等级": ["低", "中", "高", "极高"]
            };

            // QC Rules Library
            let QC_RULES = [
                { id: 'R001', name: '身份确认', description: '通话开始时必须确认客户身份', penalty: 10, keywords: [] },
                { id: 'R002', name: '禁止威胁恐吓', description: '严禁使用威胁、恐吓性语言', penalty: 30, keywords: ['坐牢', '黑名单', '法院', '抓人'] },

                { id: 'R007', name: '录音告知', description: '通话开始时必须告知录音', penalty: 10, keywords: [] }
            ];

            // Appeals Data
            let APPEALS = [];

            // Modification History
            let MODIFICATION_HISTORY = {};

            let currentState = {
                role: 'agent',
                activeCaseId: 'perfect',
                isPlaying: false,
                currentTime: 0,
                duration: 0,
                intervalId: null,
                isEditingSummary: false,
                summaryModified: false,
                originalSummary: {},
                audioElement: null,  // 真实音频元素
                isUploading: false
            };

            const $ = (selector) => document.querySelector(selector);
            const $$ = (selector) => document.querySelectorAll(selector);

            // Utility Functions
            function formatTime(seconds) {
                const minutes = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            }

            function showToast(message) {
                const toast = $('#toast-notification');
                toast.textContent = message;
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }

            function getValidCaseKeys() {
                return Object.keys(MOCK_DATA).filter(key => MOCK_DATA[key] !== null);
            }

            function isBackendCase(caseKey) {
                return BACKEND_CASE_KEYS.includes(caseKey);
            }

            function sortCaseKeys(caseKeys) {
                return [...caseKeys].sort((a, b) => {
                    const aIsBackend = isBackendCase(a);
                    const bIsBackend = isBackendCase(b);
                    if (aIsBackend && !bIsBackend) return -1;
                    if (!aIsBackend && bIsBackend) return 1;
                    return 0;
                });
            }

            function normalizeBackendCase(caseData) {
                const safeCase = caseData || {};
                const qcReport = safeCase.qcReport || { score: 0, violations: [] };

                qcReport.violations = (qcReport.violations || []).map((item, index) => ({
                    id: item.id || `db_v${index}`,
                    status: item.status || 'pending',
                    ...item
                }));

                return {
                    ...safeCase,
                    sourceType: 'backend',
                    caseInfo: {
                        customerName: 'AI识别客户',
                        debtAmount: '¥--',
                        agentName: 'AI识别坐席',
                        duration: 0,
                        ...safeCase.caseInfo
                    },
                    summary: safeCase.summary || {},
                    qcReport,
                    emotionTimeline: safeCase.emotionTimeline || {
                        agent: [{ emotion: 'neutral', duration: 1 }],
                        customer: [{ emotion: 'neutral', duration: 1 }]
                    },
                    transcript: safeCase.transcript || [],
                    storage: safeCase.storage || {}
                };
            }

            async function fetchBackendCases() {
                try {
                    const response = await fetch(`${API_BASE_URL}/api/cases?limit=100`);
                    if (!response.ok) {
                        throw new Error(`查询案件列表失败: ${response.status}`);
                    }

                    const result = await response.json();
                    if (!result.success) {
                        throw new Error(result.error || '后端返回失败');
                    }

                    BACKEND_CASE_KEYS = [];
                    (result.cases || []).forEach((caseItem) => {
                        const caseKey = caseItem.caseInfo?.id;
                        if (!caseKey) {
                            return;
                        }
                        MOCK_DATA[caseKey] = normalizeBackendCase(caseItem);
                        BACKEND_CASE_KEYS.push(caseKey);
                    });
                } catch (error) {
                    console.error('加载后端案件失败:', error);
                    showToast(`⚠️ 后端案件加载失败，已回退示例数据: ${error.message}`);
                }
            }

            async function refreshCaseListAndOpen(caseId = null) {
                await fetchBackendCases();
                renderUIForRole('agent');
                if (caseId && MOCK_DATA[caseId]) {
                    await loadCase(caseId);
                }
            }

            async function fetchCaseDetail(caseId) {

                    if (!result.success || !result.case) {

                    MOCK_DATA[caseId] = normalizeBackendCase(result.case);

            async function uploadAudioAndProcess() {
                const inputEl = $('#audio-upload-input');
                const uploadBtn = $('#audio-upload-btn');
                const selectedFile = inputEl?.files?.[0];

                if (!selectedFile) {
                    showToast('请先选择一个音频文件');
                    return;
                }

                const originalText = uploadBtn.textContent;
                const formData = new FormData();
                formData.append('file', selectedFile);

                currentState.isUploading = true;
                uploadBtn.disabled = true;
                uploadBtn.textContent = '上传处理中...';

                try {
                    const response = await fetch(`${API_BASE_URL}/api/upload_audio`, {
                        method: 'POST',
                        body: formData
                    });

                    const result = await response.json();
                    if (!response.ok || !result.success) {
                        throw new Error(result.error || `上传接口失败: ${response.status}`);
                    }

                    showToast(`✅ 上传成功，案件 ${result.caseId} 已生成`);
                    inputEl.value = '';
                    await refreshCaseListAndOpen(result.caseId);
                } catch (error) {
                    console.error('上传音频失败:', error);
                    showToast(`❌ 上传音频失败: ${error.message}`);
                } finally {
                    currentState.isUploading = false;
                    uploadBtn.disabled = false;
                    uploadBtn.textContent = originalText;
                }
            }

            // AI 分析功能 - 调用后端 LLM API
            async function runAIAnalysis() {
                const caseId = currentState.activeCaseId;
                const caseData = MOCK_DATA[caseId];

                if (!caseData || !caseData.transcript) {
                    showToast('❌ 无法获取通话转录内容');
                    return;
                }

                const aiBtn = $('#ai-analyze-btn');
                const originalText = aiBtn.innerHTML;

                // 显示加载状态
                aiBtn.disabled = true;
                aiBtn.innerHTML = `
                    <svg class="animate-spin h-4 w-4 mr-1" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    分析中...
                `;

                try {
                    const response = await fetch(`${API_BASE_URL}/api/analyze`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            transcript: caseData.transcript
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`API 请求失败: ${response.status}`);
                    }

                    const result = await response.json();

                    if (result.success) {
                        // 更新小结
                        if (result.summary) {
                            MOCK_DATA[caseId].summary = result.summary;
                            loadSummary(result.summary);
                        }

                        // 更新质检报告
                        if (result.qcReport) {
                            // 为违规项添加 ID 和状态
                            result.qcReport.violations = (result.qcReport.violations || []).map((v, i) => ({
                                ...v,
                                id: `ai_v${i}`,
                                status: 'pending'
                            }));
                            MOCK_DATA[caseId].qcReport = result.qcReport;
                            loadQCReport(result.qcReport);
                        }

                        showToast('✅ AI 分析完成！小结和质检报告已更新');
                    } else {
                        throw new Error(result.error || '分析失败');
                    }

                } catch (error) {
                    console.error('AI 分析失败:', error);
                    showToast(`❌ AI 分析失败: ${error.message}`);
                } finally {
                    // 恢复按钮状态
                    aiBtn.disabled = false;
                    aiBtn.innerHTML = originalText;
                }
            }

            // Case Loading (for Agent View)
            async function loadCase(caseId) {
                currentState.activeCaseId = caseId;
                if (isBackendCase(caseId)) {
                    await fetchCaseDetail(caseId);
                }
                const data = MOCK_DATA[caseId];

                // 停止当前播放
                if (currentState.isPlaying) {
                    togglePlayPause();
                }
                currentState.currentTime = 0;

                // 优先使用数据库返回的 WAV 签名地址
                const audioPath = data?.storage?.wavAudioUrl || null;
                if (audioPath) {
                    if (currentState.audioElement) {
                        currentState.audioElement.pause();
                        currentState.audioElement = null;
                    }
                    currentState.audioElement = new Audio(audioPath);
                    currentState.audioElement.addEventListener('loadedmetadata', () => {
                        console.log(`🎵 音频已加载: ${audioPath}, 时长: ${currentState.audioElement.duration}s`);
                    });
                    currentState.audioElement.addEventListener('ended', () => {
                        if (currentState.isPlaying) {
                            togglePlayPause();
                        }
                    });
                    currentState.audioElement.addEventListener('error', (e) => {
                        console.error('❌ 音频加载失败:', e);
                        showToast('⚠️ 音频文件加载失败，请检查 OSS 配置或签名地址');
                    });
                } else {
                    currentState.audioElement = null;
                }

                $$('.sidebar-item').forEach(el => {
                    el.classList.toggle('sidebar-item-active', el.dataset.caseId === caseId);
                });

                $('#case-id').textContent = data.caseInfo.id;

                currentState.duration = data.caseInfo.duration;
                $('#current-time').textContent = formatTime(0);
                $('#total-time').textContent = formatTime(currentState.duration);
                $('#progress-bar').style.width = '0%';

                // Store original summary
                currentState.originalSummary = JSON.parse(JSON.stringify(data.summary));
                currentState.summaryModified = false;

                // Initialize modification history for this case if not exists
                if (!MODIFICATION_HISTORY[caseId]) {
                    MODIFICATION_HISTORY[caseId] = [];
                }

                loadSummary(data.summary);

                if (currentState.isEditingSummary) {
                    toggleEditSummary();
                }

                loadQCReport(data.qcReport);
                loadEmotionTimeline(data.emotionTimeline);
                loadTranscript(data.transcript);

                updateModificationButton();
            }

            function loadSummary(summary) {
                const summaryContainer = $('#summary-content');
                summaryContainer.innerHTML = '';
                Object.entries(summary).forEach(([category, items]) => {
                    const categoryDiv = document.createElement('div');
                    categoryDiv.innerHTML = `<h4 class="text-sm font-semibold text-gray-500 mb-2">${category}</h4>`;
                    const list = document.createElement('div');
                    list.className = 'grid grid-cols-1 md:grid-cols-2 gap-x-4 gap-y-2 text-sm';
                    Object.entries(items).forEach(([key, value]) => {
                        list.innerHTML += `
                            <div class="flex">
                                <span class="text-gray-500 w-24 flex-shrink-0">${key}</span>
                                <span class="text-gray-800 font-medium" data-summary-key="${key}" data-original-value="${value}">${value}</span>
                            </div>
                        `;
                    });
                    categoryDiv.appendChild(list);
                    summaryContainer.appendChild(categoryDiv);
                });
            }

            function loadQCReport(qcReport) {
                const qcScoreEl = $('#qc-score');
                qcScoreEl.textContent = qcReport.score;
                qcScoreEl.className = 'text-2xl font-bold';
                if (qcReport.score < 80) qcScoreEl.classList.add('text-red-500');
                else if (qcReport.score < 100) qcScoreEl.classList.add('text-yellow-500');
                else qcScoreEl.classList.add('text-green-500');

                const violationsContainer = $('#qc-violations');
                violationsContainer.innerHTML = '';
                if (qcReport.violations.length === 0) {
                    violationsContainer.innerHTML = `<div class="text-center py-4 text-gray-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 mx-auto text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>

                } else {
                    qcReport.violations.forEach(v => {
                        const violationDiv = document.createElement('div');
                        violationDiv.className = 'border border-gray-200 rounded-lg p-3';
                        violationDiv.innerHTML = `
                            <div class="flex justify-between items-start mb-2">
                                <div class="flex-1">
                                    <p class="font-semibold">${v.ruleName}</p>

            function addViolationEventListeners() {

            function loadEmotionTimeline(emotionTimeline) {
                ['agent', 'customer'].forEach(person => {
                    const timelineContainer = $(`#${person}-emotion-timeline`);
                    timelineContainer.innerHTML = '';
                    const timelineData = emotionTimeline[person];
                    timelineData.forEach(segment => {
                        const bar = document.createElement('div');
                        let colorClass = 'bg-green-400';
                        if (segment.emotion === 'negative') colorClass = 'bg-yellow-400';
                        if (segment.emotion === 'angry') colorClass = 'bg-red-500';
                        bar.className = `emotion-bar ${colorClass}`;
                        bar.style.width = `${segment.duration * 100}%`;
                        timelineContainer.appendChild(bar);
                    });
                });
            }

            function loadTranscript(transcript) {
                const transcriptContainer = $('#transcript-container');
                transcriptContainer.innerHTML = '';
                transcript.forEach((line, index) => {
                    const lineDiv = document.createElement('div');
                    lineDiv.className = 'p-3 rounded-lg flex items-start space-x-3 cursor-pointer hover:bg-gray-50';
                    lineDiv.dataset.startTime = line.start;
                    lineDiv.dataset.endTime = line.end;
                    lineDiv.dataset.index = index;

                    const speakerClass = line.speaker === '坐席' ? 'bg-indigo-100 text-indigo-800' : 'bg-gray-100 text-gray-800';
                    lineDiv.innerHTML = `
                        <div class="flex-shrink-0 w-16 text-right">
                           <span class="font-mono text-xs text-gray-500">${formatTime(line.start)}</span>
                        </div>
                        <div class="flex-shrink-0 h-8 w-8 rounded-full ${speakerClass} flex items-center justify-center font-bold text-sm">
                            ${line.speaker.charAt(0)}
                        </div>
                        <div class="flex-1">
                            <p class="font-medium text-sm">${line.speaker}</p>
                            <p class="text-gray-700">${line.text}</p>
                        </div>
                    `;
                    transcriptContainer.appendChild(lineDiv);
                });

                addTranscriptEventListeners();
            }

            function addTranscriptEventListeners() {
                $$('#transcript-container > div').forEach(el => {
                    el.addEventListener('click', () => {
                        currentState.currentTime = parseFloat(el.dataset.startTime);
                        updateUI();
                    });
                });

                $$('.evidence-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        clearHighlights();
                        const start = parseFloat(e.target.dataset.start);
                        const end = parseFloat(e.target.dataset.end);
                        $$('#transcript-container > div').forEach(line => {
                            const lineStart = parseFloat(line.dataset.startTime);
                            const lineEnd = parseFloat(line.dataset.endTime);
                            if ((start === lineStart && end >= lineEnd) || (lineStart >= start && lineEnd <= end)) {
                                line.classList.add('evidence-highlight');
                                line.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            }
                        });
                    });
                });
            }

            function clearHighlights() {
                $$('#transcript-container .evidence-highlight').forEach(el => {
                    el.classList.remove('evidence-highlight');
                });
            }

            // Summary Editing
            function toggleEditSummary() {
                currentState.isEditingSummary = !currentState.isEditingSummary;
                $('#edit-summary-btn').classList.toggle('hidden');
                $('#save-summary-btn').classList.toggle('hidden');

                const summaryValues = $$('#summary-content [data-summary-key]');
                summaryValues.forEach(el => {
                    const key = el.dataset.summaryKey;
                    if (currentState.isEditingSummary) {
                        const value = el.textContent.trim();
                        const options = TAG_LIBRARY[key];

                        if (options) {
                            // Use dropdown for tags with predefined options
                            el.innerHTML = `
                                <select class="w-full border-b-2 border-indigo-200 focus:outline-none focus:border-indigo-500 transition bg-white">
                                    ${options.map(opt => `<option value="${opt}" ${opt === value ? 'selected' : ''}>${opt}</option>`).join('')}
                                </select>
                            `;
                        } else {
                            // Use text input for free-form fields
                            el.innerHTML = `<input type="text" value="${value}" class="w-full border-b-2 border-indigo-200 focus:outline-none focus:border-indigo-500 transition">`;
                        }
                    } else {
                        // Not saving, just viewing
                        const input = el.querySelector('input, select');
                        el.textContent = input.value;
                    }
                });
            }

            function saveSummary() {
                const summaryValues = $$('#summary-content [data-summary-key]');
                const modifications = [];

                summaryValues.forEach(el => {
                    const key = el.dataset.summaryKey;
                    const originalValue = el.dataset.originalValue;
                    const input = el.querySelector('input, select');
                    const newValue = input.value;

                    if (originalValue !== newValue) {
                        modifications.push({
                            field: key,
                            originalValue: originalValue,
                            newValue: newValue,
                            timestamp: new Date().toLocaleString('zh-CN')
                        });

                        // Mark as modified
                        el.innerHTML = `<span class="modified">${newValue}<span class="modified-indicator"></span></span>`;
                        el.dataset.originalValue = newValue;
                        currentState.summaryModified = true;
                    } else {
                        el.textContent = newValue;
                    }
                });

                if (modifications.length > 0) {
                    MODIFICATION_HISTORY[currentState.activeCaseId].push(...modifications);
                    showToast(`已保存 ${modifications.length} 处修改`);
                } else {
                    showToast('未检测到修改');
                }

                currentState.isEditingSummary = false;
                $('#edit-summary-btn').classList.remove('hidden');
                $('#save-summary-btn').classList.add('hidden');

                updateModificationButton();
            }

            function updateModificationButton() {
                const btn = $('#view-modifications-btn');
                const count = MODIFICATION_HISTORY[currentState.activeCaseId]?.length || 0;
                if (count > 0) {
                    btn.classList.remove('hidden');
                } else {
                    btn.classList.add('hidden');
                }
            }

            function showModificationHistory() {
                const modal = $('#modification-modal');
                const historyContainer = $('#modification-history');
                const history = MODIFICATION_HISTORY[currentState.activeCaseId] || [];

                if (history.length === 0) {
                    historyContainer.innerHTML = '<p class="text-center text-gray-500 py-4">暂无修改记录</p>';
                } else {
                    historyContainer.innerHTML = history.map(mod => `
                        <div class="border border-gray-200 rounded-lg p-3">
                            <div class="flex justify-between items-start mb-2">
                                <p class="font-medium text-gray-900">${mod.field}</p>
                                <span class="text-xs text-gray-500">${mod.timestamp}</span>
                            </div>
                            <div class="grid grid-cols-2 gap-2 text-sm">
                                <div>
                                    <p class="text-gray-500 text-xs">AI原始结果</p>
                                    <p class="text-gray-700">${mod.originalValue}</p>
                                </div>
                                <div>
                                    <p class="text-gray-500 text-xs">人工修正结果</p>
                                    <p class="text-indigo-600 font-medium">${mod.newValue}</p>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }

                modal.classList.remove('hidden');
            }

            // Appeal Modal
            function openAppealModal(violationId) {
                const caseData = MOCK_DATA[currentState.activeCaseId];
                const violation = caseData.qcReport.violations.find(v => v.id === violationId);

                if (!violation) return;

                $('#appeal-rule-name').textContent = violation.ruleName;
                $('#appeal-penalty').textContent = `-${violation.penalty}分`;
                $('#appeal-reason').value = '';

                const modal = $('#appeal-modal');
                modal.classList.remove('hidden');

                $('#submit-appeal-btn').onclick = () => {
                    const reason = $('#appeal-reason').value.trim();
                    if (!reason) {
                        alert('请填写申诉理由');
                        return;
                    }

                    const appeal = {
                        id: 'appeal_' + Date.now(),
                        caseId: caseData.caseInfo.id,
                        agentName: caseData.caseInfo.agentName,
                        ruleId: violation.ruleId,
                        ruleName: violation.ruleName,
                        penalty: violation.penalty,
                        evidence: violation.evidence,
                        reason: reason,
                        status: 'pending',
                        submitTime: new Date().toLocaleString('zh-CN')
                    };

                    APPEALS.push(appeal);
                    modal.classList.add('hidden');
                    showToast('申诉已提交,等待主管复核');
                };
            }

            $('#cancel-appeal-btn')?.addEventListener('click', () => {
                $('#appeal-modal').classList.add('hidden');
            });

            $('#close-modification-modal-btn')?.addEventListener('click', () => {
                $('#modification-modal').classList.add('hidden');
            });

            // Player Controls
            function updateUI() {
                const progress = (currentState.currentTime / currentState.duration) * 100;
                $('#progress-bar').style.width = `${progress}%`;
                $('#current-time').textContent = formatTime(currentState.currentTime);

                $$('#transcript-container .highlight').forEach(el => el.classList.remove('highlight'));
                const activeLine = Array.from($$('#transcript-container > div')).find(el => {
                    const start = parseFloat(el.dataset.startTime);
                    const end = parseFloat(el.dataset.endTime);
                    return currentState.currentTime >= start && currentState.currentTime < end;
                });
                if (activeLine) {
                    activeLine.classList.add('highlight');
                }
            }

            function tick() {
                if (!currentState.isPlaying) return;

                // 如果有真实音频，从音频元素同步时间
                if (currentState.audioElement && !currentState.audioElement.paused) {
                    currentState.currentTime = currentState.audioElement.currentTime;
                } else {
                    // 模拟计时
                    currentState.currentTime += 0.1;
                }

                if (currentState.currentTime >= currentState.duration) {
                    currentState.currentTime = currentState.duration;
                    togglePlayPause();
                }
                updateUI();
            }

            function togglePlayPause() {
                currentState.isPlaying = !currentState.isPlaying;
                $('#play-icon').classList.toggle('hidden', currentState.isPlaying);
                $('#pause-icon').classList.toggle('hidden', !currentState.isPlaying);

                if (currentState.isPlaying) {
                    // 开始播放
                    if (currentState.currentTime >= currentState.duration) {
                        currentState.currentTime = 0;
                    }

                    // 播放真实音频（如果有）
                    if (currentState.audioElement) {
                        currentState.audioElement.currentTime = currentState.currentTime;
                        currentState.audioElement.play().catch(e => {
                            console.error('音频播放失败:', e);
                            showToast('⚠️ 音频播放失败，请检查文件是否存在');
                        });
                    }

                    currentState.intervalId = setInterval(tick, 100);
                } else {
                    // 暂停播放
                    clearInterval(currentState.intervalId);

                    if (currentState.audioElement) {
                        currentState.audioElement.pause();
                    }
                }
            }

            // Gemini Suggestion Modal
            async function openSuggestionModal() {
                const modal = $('#suggestion-modal');
                const suggestionLoading = $('#suggestion-loading');
                const suggestionText = $('#suggestion-text');

                modal.classList.remove('hidden');
                suggestionLoading.style.display = 'flex';
                suggestionText.classList.add('hidden');

                const currentCaseData = MOCK_DATA[currentState.activeCaseId];
                const transcriptText = currentCaseData.transcript.map(line => `${line.speaker}: ${line.text}`).join('\n');

                const suggestion = await getGeminiSuggestion(transcriptText, currentCaseData.summary, currentCaseData.qcReport);

                suggestionText.innerHTML = suggestion.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                suggestionLoading.style.display = 'none';
                suggestionText.classList.remove('hidden');
            }

            async function getGeminiSuggestion(transcriptText, summaryData, qcReportData) {
                const violations = qcReportData?.violations || [];
                const score = qcReportData?.score ?? 0;
                const riskLevel = summaryData?.["行动项标签"]?.["风险等级"] || "待评估";
                const nextAction = summaryData?.["行动项标签"]?.["待办事项"] || "建议补充后续跟进动作";
                const transcriptPreview = transcriptText.split('\n').slice(0, 4).join('\n');

                const improvementLines = violations.length > 0
                    ? violations.map((item, index) => `${index + 1}. ${item.ruleName}：${item.suggestion || '建议补充规范开场、保持礼貌并避免强压式表达。'}`)
                    : ['1. 当前质检无明显违规，建议继续保持身份确认、录音告知和还款确认闭环。'];

                return [
                    `**总体评价**`,
                    score >= 90 ? '本次通话整体较稳定，合规风险较低。' : '本次通话存在需要重点复盘的合规或沟通问题。',
                    ``,
                    `**亮点与肯定**`,
                    `- 当前风险等级：${riskLevel}`,
                    `- 当前待办事项：${nextAction}`,
                    ``,
                    `**待改进点**`,
                    ...improvementLines.map(line => `- ${line}`),
                    ``,
                    `**推荐话术**`,
                    `- 开场建议：“您好，这里是XX银行，为保证通话质量，本次通话将被录音，请问是您本人吗？”`,
                    `- 协商建议：“我理解您目前有压力，我们先确认一个您能执行的还款时间，我这边帮您做好备注。”`,
                    ``,
                    `**通话片段参考**`,
                    transcriptPreview || '暂无转录内容。'
                ].join('\n');
            }

            $('#close-suggestion-modal-btn')?.addEventListener('click', () => {
                $('#suggestion-modal').classList.add('hidden');
            });

            // Role Selector
            $('#role-selector').addEventListener('change', (e) => {
                renderUIForRole(e.target.value);
            });

            // Initial Load
            (async () => {
                await fetchBackendCases();
                renderUIForRole('agent');
            })();
        });
    </script>
</body>

</html>
