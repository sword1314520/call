<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>催收场景AI助手 - Vue版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Helvetica Neue', 'Arial', 'sans-serif';
            background-color: #f0f2f5;
        }

        .highlight {
            background-color: #fef9c3;
            transition: background-color 0.3s ease;
        }

        .evidence-highlight {
            background-color: #fecaca;
            border-left: 3px solid #ef4444;
            padding-left: 5px;
            transition: all 0.3s ease;
        }

        .emotion-bar {
            transition: all 0.2s ease-in-out;
        }

        .sidebar-item {
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            border-left: 4px solid transparent;
        }

        .sidebar-item:hover {
            background-color: #f3f4f6;
        }

        .sidebar-item-active {
            background-color: #eef2ff;
            border-left-color: #4f46e5;
        }

        .modified {
            background-color: #fef3c7;
            padding: 2px 4px;
            border-radius: 4px;
            position: relative;
        }

        .modified-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #f59e0b;
            border-radius: 50%;
            margin-left: 4px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }

        .toast {
            visibility: hidden;
            min-width: 250px;
            margin-left: -125px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 2px;
            padding: 16px;
            position: fixed;
            z-index: 100;
            left: 50%;
            bottom: 30px;
            font-size: 17px;
            opacity: 0;
            transition: opacity 0.3s, visibility 0.3s, bottom 0.3s;
        }

        .toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }

        .tab-button {
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-button:hover {
            background-color: #f3f4f6;
        }

        .tab-button-active {
            border-bottom-color: #4f46e5;
            color: #4f46e5;
            font-weight: 600;
        }

        .role-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
    </style>
</head>

<body class="antialiased text-gray-800">
    <div id="app" class="flex h-screen bg-gray-100">
        <aside class="w-72 bg-white flex-shrink-0 border-r border-gray-200 flex flex-col">
            <div class="h-16 flex items-center justify-center border-b border-gray-200">
                <h1 class="text-xl font-bold text-indigo-600">催收场景AI助手 - Vue版</h1>
            </div>

            <div class="p-4 border-b border-gray-200">
                <label class="text-sm font-medium text-gray-600 mb-2 block">当前角色</label>
                <select v-model="state.role"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="agent">催收坐席</option>
                    <option value="supervisor">催收主管</option>
                    <option value="analyst">数据分析师</option>
                    <option value="admin">系统管理员</option>
                </select>
            </div>

            <nav class="flex-1 p-3 space-y-2 overflow-y-auto">
                <template v-if="state.role === 'agent'">
                    <div class="px-2 mb-2">
                        <h2 class="text-base font-semibold text-gray-800">我的案件</h2>
                        <p class="text-sm text-gray-500">共 {{ validCaseKeys.length }} 个案件</p>
                    </div>
                    <div class="mb-4 rounded-lg border border-dashed border-indigo-300 bg-indigo-50 p-3">
                        <p class="text-sm font-medium text-indigo-800 mb-2">上传音频并自动处理</p>
                        <input ref="audioUploadInput" type="file" accept=".m4a,.wav,.mp3,.mp4,audio/*"
                            class="block w-full text-sm text-gray-600 mb-2">
                        <button @click="uploadAudioAndProcess"
                            class="w-full px-3 py-2 text-sm font-medium text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 disabled:opacity-60"
                            :disabled="state.isUploading">
                            {{ state.isUploading ? '上传处理中...' : '上传并处理' }}
                        </button>
                        <p class="text-xs text-indigo-500 mt-2">上传后会自动完成 ASR、OSS 上传、MySQL 入库。</p>
                    </div>
                    <div class="space-y-1">
                        <div v-for="key in sortedCaseKeys" :key="key" class="sidebar-item"
                            :class="{ 'sidebar-item-active': state.activeCaseId === key }" @click="loadCase(key)">
                            <div class="flex justify-between items-start w-full">
                                <div>
                                    <p class="font-semibold text-gray-800">{{ cases[key].caseInfo.customerName }}</p>
                                    <p class="text-xs text-gray-500 mt-1">{{ cases[key].caseInfo.id }}</p>
                                    <p class="text-sm text-gray-600 mt-1">
                                        时长: {{ Math.round(cases[key].caseInfo.duration || 0) }}秒
                                    </p>
                                </div>
                                <span v-if="isBackendCase(key)"
                                    class="text-xs font-medium bg-purple-100 text-purple-800 px-2 py-0.5 rounded-full">🎙️
                                    AI识别</span>
                                <span v-else
                                    class="text-xs font-medium bg-green-100 text-green-800 px-2 py-0.5 rounded-full">模拟</span>
                            </div>
                        </div>
                    </div>
                </template>

                <template v-else-if="state.role === 'supervisor'">
                    <div class="px-2 mb-2">
                        <h2 class="text-base font-semibold text-gray-800">团队管理</h2>
                    </div>
                    <div class="space-y-1">
                        <div class="sidebar-item" :class="{ 'sidebar-item-active': state.supervisorView === 'dashboard' }"
                            @click="state.supervisorView = 'dashboard'">数据看板</div>
                        <div class="sidebar-item" :class="{ 'sidebar-item-active': state.supervisorView === 'appeals' }"
                            @click="state.supervisorView = 'appeals'">
                            申诉复核
                            <span class="ml-2 bg-red-500 text-white text-xs px-2 py-0.5 rounded-full">
                                {{ pendingAppeals.length }}
                            </span>
                        </div>
                        <div class="sidebar-item" :class="{ 'sidebar-item-active': state.supervisorView === 'team-cases' }"
                            @click="state.supervisorView = 'team-cases'">团队案件</div>
                    </div>
                </template>

                <template v-else-if="state.role === 'analyst'">
                    <div class="px-2 mb-2">
                        <h2 class="text-base font-semibold text-gray-800">分析视图</h2>
                    </div>
                    <div class="space-y-1">
                        <div class="sidebar-item" :class="{ 'sidebar-item-active': state.analystView === 'overview' }"
                            @click="state.analystView = 'overview'">总体分析</div>
                        <div class="sidebar-item" :class="{ 'sidebar-item-active': state.analystView === 'emotion' }"
                            @click="state.analystView = 'emotion'">情绪分析</div>
                        <div class="sidebar-item" :class="{ 'sidebar-item-active': state.analystView === 'export' }"
                            @click="state.analystView = 'export'">数据导出</div>
                    </div>
                </template>

                <template v-else>
                    <div class="px-2 mb-2">
                        <h2 class="text-base font-semibold text-gray-800">系统管理</h2>
                    </div>
                    <div class="space-y-1">
                        <div class="sidebar-item" :class="{ 'sidebar-item-active': state.adminView === 'tags' }"
                            @click="state.adminView = 'tags'">标签知识库</div>
                        <div class="sidebar-item" :class="{ 'sidebar-item-active': state.adminView === 'rules' }"
                            @click="state.adminView = 'rules'">质检规则</div>
                        <div class="sidebar-item" :class="{ 'sidebar-item-active': state.adminView === 'users' }"
                            @click="state.adminView = 'users'">用户管理</div>
                    </div>
                </template>
            </nav>

            <div class="p-4 border-t border-gray-200">
                <div class="p-4 bg-indigo-50 rounded-lg text-center">
                    <p class="text-sm font-medium text-indigo-800">用户: <span>{{ currentUserName }}</span></p>
                    <p class="text-xs text-indigo-500 mt-1">演示模式</p>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <template v-if="state.role === 'agent'">
                <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6">
                    <div class="flex items-center space-x-3">
                        <h2 class="text-lg font-semibold text-gray-900">案件详情: <span>{{ activeCase?.caseInfo?.id || '' }}</span>
                        </h2>
                        <span class="bg-gray-200 text-gray-600 text-xs font-medium px-2.5 py-0.5 rounded-full">事后分析模式
                            (POC)</span>
                    </div>
                    <div class="flex items-center space-x-4">
                        <button @click="openSuggestionModal"
                            class="px-4 py-2 text-sm font-medium text-indigo-600 bg-indigo-100 rounded-lg shadow-sm hover:bg-indigo-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition flex items-center">
                            生成沟通建议
                        </button>
                        <button @click="showToast('案件数据已同步。API接口可无缝对接生产系统。')"
                            class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-lg shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition">
                            同步至CRM
                        </button>
                    </div>
                </header>

                <div class="flex-1 p-6 overflow-auto grid grid-cols-1 lg:grid-cols-2 gap-6" v-if="activeCase">
                    <div class="flex flex-col space-y-6">
                        <div class="bg-white rounded-lg shadow-md">
                            <div class="p-6">
                                <div class="flex justify-between items-center mb-4">
                                    <h3 class="text-lg font-semibold">智能小结</h3>
                                    <div class="flex items-center space-x-2">
                                        <button @click="runAIAnalysis"
                                            class="text-sm font-medium text-white bg-purple-600 px-3 py-1 rounded-md hover:bg-purple-700 flex items-center disabled:opacity-60"
                                            :disabled="state.analyzing">
                                            {{ state.analyzing ? '分析中...' : 'AI 分析' }}
                                        </button>
                                        <button v-if="modificationCount > 0" @click="showModificationModal = true"
                                            class="text-sm font-medium text-gray-600 hover:text-gray-800">
                                            查看修改记录
                                        </button>
                                        <button v-if="!state.isEditingSummary" @click="state.isEditingSummary = true"
                                            class="text-sm font-medium text-indigo-600 hover:text-indigo-800">编辑</button>
                                        <button v-else @click="saveSummary"
                                            class="text-sm font-medium text-white bg-indigo-600 px-3 py-1 rounded-md hover:bg-indigo-700">保存</button>
                                    </div>
                                </div>
                                <div class="space-y-4">
                                    <div v-for="(items, category) in editableSummary" :key="category">
                                        <h4 class="text-sm font-semibold text-gray-500 mb-2">{{ category }}</h4>
                                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-4 gap-y-2 text-sm">
                                            <div v-for="(value, key) in items" :key="key" class="flex">
                                                <span class="text-gray-500 w-24 flex-shrink-0">{{ key }}</span>
                                                <template v-if="state.isEditingSummary">
                                                    <select v-if="tagLibrary[key]"
                                                        v-model="editableSummary[category][key]"
                                                        class="w-full border-b-2 border-indigo-200 focus:outline-none focus:border-indigo-500 transition bg-white">
                                                        <option v-for="opt in tagLibrary[key]" :key="opt" :value="opt">{{ opt }}
                                                        </option>
                                                    </select>
                                                    <input v-else v-model="editableSummary[category][key]" type="text"
                                                        class="w-full border-b-2 border-indigo-200 focus:outline-none focus:border-indigo-500 transition">
                                                </template>
                                                <template v-else>
                                                    <span class="text-gray-800 font-medium"
                                                        :class="{ modified: isModified(category, key) }">
                                                        {{ value }}
                                                        <span v-if="isModified(category, key)"
                                                            class="modified-indicator"></span>
                                                    </span>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="mt-4 pt-4 border-t border-gray-200">
                                    <button @click="showToast('小结已确认并提交,记录已保存')"
                                        class="w-full px-4 py-2 bg-green-600 text-white font-medium rounded-lg hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500">
                                        确认无误并提交
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="bg-white rounded-lg shadow-md p-6">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-lg font-semibold">智能质检报告</h3>
                                <div class="text-right">
                                    <p class="text-2xl font-bold" :class="qcScoreClass(activeCase.qcReport.score)">{{
                                        activeCase.qcReport.score }}</p>
                                    <p class="text-sm text-gray-500">综合得分</p>
                                </div>
                            </div>
                            <div class="space-y-3">
                                <div v-if="activeCase.qcReport.violations.length === 0" class="text-center py-4 text-gray-500">
                                    <p class="mt-2 text-sm">本次通话质检合规</p>
                                </div>
                                <div v-for="v in activeCase.qcReport.violations" :key="v.id"
                                    class="border border-gray-200 rounded-lg p-3">
                                    <div class="flex justify-between items-start mb-2">
                                        <div class="flex-1">
                                            <p class="font-semibold">{{ v.ruleName }}</p>
                                            <p class="text-xs text-gray-500 mt-1">{{ v.evidence }}</p>
                                        </div>
                                        <div class="text-right flex-shrink-0 ml-4">
                                            <p class="font-bold text-red-500">-{{ v.penalty }}分</p>
                                        </div>
                                    </div>
                                    <div class="flex space-x-2">
                                        <button @click="highlightEvidence(v.start, v.end)"
                                            class="text-xs text-indigo-600 hover:underline">查看证据</button>
                                        <button @click="openAppealModal(v)"
                                            class="text-xs text-yellow-600 hover:underline">申诉</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-lg shadow-md flex flex-col overflow-hidden">
                        <div class="p-6 border-b border-gray-200">
                            <div class="flex items-center space-x-4 mb-4">
                                <button @click="togglePlayPause"
                                    class="w-10 h-10 flex items-center justify-center rounded-full bg-indigo-600 text-white hover:bg-indigo-700 focus:outline-none">
                                    <span v-if="!state.isPlaying">▶</span>
                                    <span v-else>❚❚</span>
                                </button>
                                <div class="flex-1 flex items-center space-x-2">
                                    <span class="text-sm font-mono text-gray-600">{{ formatTime(state.currentTime) }}</span>
                                    <div class="w-full bg-gray-200 rounded-full h-2.5">
                                        <div class="bg-indigo-600 h-2.5 rounded-full"
                                            :style="{ width: `${progressPercent}%` }"></div>
                                    </div>
                                    <span class="text-sm font-mono text-gray-600">{{ formatTime(state.duration) }}</span>
                                </div>
                            </div>
                            <div>
                                <p class="text-sm font-medium text-gray-600 mb-2">情绪时间轴</p>
                                <div class="space-y-2">
                                    <div class="flex items-center">
                                        <span class="w-16 text-xs text-gray-500">坐席</span>
                                        <div class="flex-1 h-4 bg-gray-200 rounded-md overflow-hidden flex">
                                            <div v-for="(segment, i) in activeCase.emotionTimeline.agent" :key="`a-${i}`"
                                                class="emotion-bar" :class="emotionColor(segment.emotion)"
                                                :style="{ width: `${segment.duration * 100}%` }"></div>
                                        </div>
                                    </div>
                                    <div class="flex items-center">
                                        <span class="w-16 text-xs text-gray-500">客户</span>
                                        <div class="flex-1 h-4 bg-gray-200 rounded-md overflow-hidden flex">
                                            <div v-for="(segment, i) in activeCase.emotionTimeline.customer" :key="`c-${i}`"
                                                class="emotion-bar" :class="emotionColor(segment.emotion)"
                                                :style="{ width: `${segment.duration * 100}%` }"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="flex-1 p-6 overflow-y-auto">
                            <div v-for="(line, index) in activeCase.transcript" :key="index"
                                class="p-3 rounded-lg flex items-start space-x-3 cursor-pointer hover:bg-gray-50"
                                :class="transcriptLineClass(line, index)" @click="jumpToTime(line.start)">
                                <div class="flex-shrink-0 w-16 text-right">
                                    <span class="font-mono text-xs text-gray-500">{{ formatTime(line.start) }}</span>
                                </div>
                                <div class="flex-shrink-0 h-8 w-8 rounded-full flex items-center justify-center font-bold text-sm"
                                    :class="line.speaker === '坐席' ? 'bg-indigo-100 text-indigo-800' : 'bg-gray-100 text-gray-800'">
                                    {{ line.speaker.charAt(0) }}
                                </div>
                                <div class="flex-1">
                                    <p class="font-medium text-sm">{{ line.speaker }}</p>
                                    <p class="text-gray-700">{{ line.text }}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <template v-else-if="state.role === 'supervisor'">
                <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6">
                    <h2 class="text-lg font-semibold text-gray-900">
                        {{ state.supervisorView === 'dashboard' ? '团队数据看板' : state.supervisorView === 'appeals' ? '申诉复核中心' : '团队案件总览' }}
                    </h2>
                    <span class="role-badge bg-purple-100 text-purple-800">催收主管</span>
                </header>
                <div class="flex-1 p-6 overflow-auto" v-if="state.supervisorView === 'dashboard'">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
                        <div class="bg-white rounded-lg shadow-md p-6">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-gray-500">今日通话量</p>
                                    <p class="text-3xl font-bold text-gray-900 mt-2">128</p>
                                </div>
                                <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                                    <span class="text-blue-600 font-bold">话</span>
                                </div>
                            </div>
                            <p class="text-xs text-green-600 mt-2">↑ 12% 较昨日</p>
                        </div>
                        <div class="bg-white rounded-lg shadow-md p-6">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-gray-500">平均通话时长</p>
                                    <p class="text-3xl font-bold text-gray-900 mt-2">3:24</p>
                                </div>
                                <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                                    <span class="text-green-600 font-bold">时</span>
                                </div>
                            </div>
                            <p class="text-xs text-green-600 mt-2">↓ 8秒 较上周</p>
                        </div>
                        <div class="bg-white rounded-lg shadow-md p-6">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-gray-500">平均得分</p>
                                    <p class="text-3xl font-bold text-gray-900 mt-2">{{ averageScore }}</p>
                                </div>
                                <div class="w-12 h-12 bg-yellow-100 rounded-full flex items-center justify-center">
                                    <span class="text-yellow-600 font-bold">分</span>
                                </div>
                            </div>
                            <p class="text-xs text-red-600 mt-2">↓ 2分 较上月</p>
                        </div>
                        <div class="bg-white rounded-lg shadow-md p-6">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-gray-500">待复核申诉</p>
                                    <p class="text-3xl font-bold text-gray-900 mt-2">{{ pendingAppeals.length }}</p>
                                </div>
                                <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center">
                                    <span class="text-red-600 font-bold">申</span>
                                </div>
                            </div>
                            <p class="text-xs text-yellow-600 mt-2">需今日处理</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
                        <div class="xl:col-span-2 bg-white rounded-lg shadow-md p-6">
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="text-lg font-semibold">团队案件表现</h3>
                                <span class="text-sm text-gray-500">高风险案件 {{ highRiskCases }} 个</span>
                            </div>
                            <div class="space-y-4">
                                <div v-for="key in sortedCaseKeys" :key="`dashboard-${key}`"
                                    class="border border-gray-200 rounded-lg p-4">
                                    <div class="flex justify-between items-start">
                                        <div>
                                            <p class="font-semibold">{{ cases[key].caseInfo.customerName }}</p>
                                            <p class="text-sm text-gray-500 mt-1">{{ cases[key].caseInfo.id }}</p>
                                        </div>
                                        <span class="text-sm font-bold" :class="qcScoreClass(cases[key].qcReport.score)">
                                            {{ cases[key].qcReport.score }}分
                                        </span>
                                    </div>
                                    <div class="mt-3 text-sm text-gray-600">
                                        风险等级：{{ cases[key].summary?.["行动项标签"]?.["风险等级"] || '待评估' }}
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white rounded-lg shadow-md p-6">
                            <h3 class="text-lg font-semibold mb-4">主管关注事项</h3>
                            <div class="space-y-3 text-sm">

            computed: {
                validCaseKeys() {
                    return Object.keys(this.cases).filter(key => this.cases[key] !== null);
                },
                sortedCaseKeys() {
                    return [...this.validCaseKeys].sort((a, b) => {
                        const aIsBackend = this.isBackendCase(a);
                        const bIsBackend = this.isBackendCase(b);
                        if (aIsBackend && !bIsBackend) return -1;
                        if (!aIsBackend && bIsBackend) return 1;
                        return 0;
                    });
                },
                activeCase() {
                    return this.cases[this.state.activeCaseId] || null;
                },
                pendingAppeals() {
                    return this.appeals.filter(a => a.status === 'pending');
                },
                approvedAppeals() {
                    return this.appeals.filter(a => a.status === 'approved');
                },
                rejectedAppeals() {
                    return this.appeals.filter(a => a.status === 'rejected');
                },
                filteredAppeals() {
                    return this.appeals.filter(a => a.status === this.state.appealTab);
                },
                averageScore() {
                    const scores = this.validCaseKeys.map(key => this.cases[key].qcReport.score || 0);
                    if (!scores.length) return 0;
                    return Math.round(scores.reduce((sum, item) => sum + item, 0) / scores.length);
                },
                highRiskCases() {
                    return this.validCaseKeys.filter(key => {
                        const risk = this.cases[key].summary?.["行动项标签"]?.["风险等级"];
                        return risk === '高' || risk === '极高';
                    }).length;
                },
                riskDistribution() {
                    const result = {};
                    this.validCaseKeys.forEach(key => {
                        const risk = this.cases[key].summary?.["行动项标签"]?.["风险等级"] || '未知';
                        result[risk] = (result[risk] || 0) + 1;
                    });
                    return result;
                },
                violationDistribution() {
                    const result = {};
                    this.validCaseKeys.forEach(key => {
                        (this.cases[key].qcReport.violations || []).forEach(v => {
                            result[v.ruleName] = (result[v.ruleName] || 0) + 1;
                        });
                    });
                    return result;
                },
                progressPercent() {
                    if (!this.state.duration) return 0;
                    return Math.min(100, (this.state.currentTime / this.state.duration) * 100);
                },
                modificationCount() {
                    return (this.modificationHistory[this.state.activeCaseId] || []).length;
                },
                currentModifications() {
                    return this.modificationHistory[this.state.activeCaseId] || [];
                },
                currentRoleLabel() {
                    return this.roleUserMap[this.state.role] || '演示用户';
                }
            },
            methods: {
                formatTime(seconds) {
                    const minutes = Math.floor(seconds / 60);
                    const secs = Math.floor(seconds % 60);
                    return `${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                },
                showToast(message) {
                    this.toast.message = message;
                    this.toast.show = true;
                    clearTimeout(this._toastTimer);
                    this._toastTimer = setTimeout(() => {
                        this.toast.show = false;
                    }, 3000);
                },
                isBackendCase(caseKey) {
                    return this.backendCaseKeys.includes(caseKey);
                },
                normalizeBackendCase(caseData) {
                    const safeCase = caseData || {};
                    const qcReport = safeCase.qcReport || { score: 0, violations: [] };
                    qcReport.violations = (qcReport.violations || []).map((item, index) => ({
                        id: item.id || `db_v${index}`,
                        status: item.status || 'pending',
                        ...item
                    }));

                    return {
                        ...safeCase,
                        sourceType: 'backend',
                        caseInfo: {
                            customerName: 'AI识别客户',
                            debtAmount: '¥--',
                            agentName: 'AI识别坐席',
                            duration: 0,
                            ...safeCase.caseInfo
                        },
                        summary: safeCase.summary || {},
                        qcReport,
                        emotionTimeline: safeCase.emotionTimeline || {
                            agent: [{ emotion: 'neutral', duration: 1 }],
                            customer: [{ emotion: 'neutral', duration: 1 }]
                        },
                        transcript: safeCase.transcript || [],
                        storage: safeCase.storage || {}
                    };
                },
                async fetchBackendCases() {
                    try {
                        const response = await fetch(`${this.apiBaseUrl}/api/cases?limit=100`);
                        if (!response.ok) throw new Error(`查询案件列表失败: ${response.status}`);
                        const result = await response.json();
                        if (!result.success) throw new Error(result.error || '后端返回失败');
                        this.backendCaseKeys = [];
                        (result.cases || []).forEach(caseItem => {
                            const caseKey = caseItem.caseInfo?.id;
                            if (!caseKey) return;
                            this.cases[caseKey] = this.normalizeBackendCase(caseItem);
                            this.backendCaseKeys.push(caseKey);
                        });
                    } catch (error) {
                        this.showToast(`⚠️ 后端案件加载失败，已回退示例数据: ${error.message}`);
                    }
                },
                async fetchCaseDetail(caseId) {
                    try {
                        const response = await fetch(`${this.apiBaseUrl}/api/cases/${encodeURIComponent(caseId)}`);
                        if (!response.ok) throw new Error(`查询案件详情失败: ${response.status}`);
                        const result = await response.json();
                        if (!result.success || !result.case) throw new Error(result.error || '案件详情为空');
                        this.cases[caseId] = this.normalizeBackendCase(result.case);
                    } catch (error) {
                        this.showToast(`⚠️ 案件详情刷新失败: ${error.message}`);
                    }
                },
                cloneSummary(summary) {
                    return JSON.parse(JSON.stringify(summary || {}));
                },
                async loadCase(caseId) {
                    this.state.activeCaseId = caseId;
                    if (this.isBackendCase(caseId)) {
                        await this.fetchCaseDetail(caseId);
                    }

                    if (this.state.isPlaying) {
                        this.togglePlayPause();
                    }
                    this.state.currentTime = 0;
                    this.highlightedRange = null;

                    const data = this.activeCase;
                    if (!data) return;

                    if (this.audioElement) {
                        this.audioElement.pause();
                        this.audioElement = null;
                    }

                    const audioPath = data?.storage?.wavAudioUrl || null;
                    if (audioPath) {
                        this.audioElement = new Audio(audioPath);
                        this.audioElement.addEventListener('ended', () => {
                            if (this.state.isPlaying) this.togglePlayPause();
                        });
                        this.audioElement.addEventListener('error', () => {
                            this.showToast('⚠️ 音频文件加载失败，请检查 OSS 配置或签名地址');
                        });
                    }

                    this.state.duration = data.caseInfo.duration || 0;
                    this.editableSummary = this.cloneSummary(data.summary);
                    this.originalSummarySnapshot = this.cloneSummary(data.summary);
                    this.state.isEditingSummary = false;

                    if (!this.modificationHistory[caseId]) {
                        this.modificationHistory[caseId] = [];
                    }
                },
                qcScoreClass(score) {
                    if (score < 80) return 'text-red-500';
                    if (score < 100) return 'text-yellow-500';
                    return 'text-green-500';
                },
                emotionColor(emotion) {
                    if (emotion === 'negative') return 'bg-yellow-400';
                    if (emotion === 'angry') return 'bg-red-500';
                    return 'bg-green-400';
                },
                isModified(category, key) {
                    const current = this.editableSummary?.[category]?.[key];
                    const original = this.originalSummarySnapshot?.[category]?.[key];
                    return current !== original;
                },
                saveSummary() {
                    const modifications = [];
                    Object.entries(this.editableSummary).forEach(([category, items]) => {
                        Object.entries(items).forEach(([key, value]) => {
                            const originalValue = this.activeCase.summary?.[category]?.[key];
                            if (originalValue !== value) {
                                modifications.push({
                                    field: key,
                                    originalValue,
                                    newValue: value,
                                    timestamp: new Date().toLocaleString('zh-CN')
                                });
                            }
                        });
                    });

                    this.activeCase.summary = this.cloneSummary(this.editableSummary);
                    if (modifications.length > 0) {
                        this.modificationHistory[this.state.activeCaseId].push(...modifications);
                        this.showToast(`已保存 ${modifications.length} 处修改`);
                    } else {
                        this.showToast('未检测到修改');
                    }
                    this.state.isEditingSummary = false;
                },
                highlightEvidence(start, end) {
                    this.highlightedRange = { start, end };
                },
                transcriptLineClass(line) {
                    const classes = [];
                    if (this.highlightedRange) {
                        if ((line.start >= this.highlightedRange.start && line.end <= this.highlightedRange.end) ||
                            (line.start === this.highlightedRange.start && line.end <= this.highlightedRange.end)) {
                            classes.push('evidence-highlight');
                        }
                    }
                    if (this.state.currentTime >= line.start && this.state.currentTime < line.end) {
                        classes.push('highlight');
                    }
                    return classes;
                },
                jumpToTime(time) {
                    this.state.currentTime = time;
                    if (this.audioElement) {
                        this.audioElement.currentTime = time;
                    }
                },
                tick() {
                    if (!this.state.isPlaying) return;
                    if (this.audioElement && !this.audioElement.paused) {
                        this.state.currentTime = this.audioElement.currentTime;
                    } else {
                        this.state.currentTime += 0.1;
                    }
                    if (this.state.currentTime >= this.state.duration) {
                        this.state.currentTime = this.state.duration;
                        this.togglePlayPause();
                    }
                },
                togglePlayPause() {
                    this.state.isPlaying = !this.state.isPlaying;
                    if (this.state.isPlaying) {
                        if (this.state.currentTime >= this.state.duration) {
                            this.state.currentTime = 0;
                        }
                        if (this.audioElement) {
                            this.audioElement.currentTime = this.state.currentTime;
                            this.audioElement.play().catch(() => {
                                this.showToast('⚠️ 音频播放失败，请检查文件是否存在');
                            });
                        }
                        this.state.intervalId = setInterval(this.tick, 100);
                    } else {
                        clearInterval(this.state.intervalId);
                        if (this.audioElement) this.audioElement.pause();
                    }
                },
                async runAIAnalysis() {
                    if (!this.activeCase?.transcript) {
                        this.showToast('❌ 无法获取通话转录内容');
                        return;
                    }
                    this.state.analyzing = true;
                    try {
                        const response = await fetch(`${this.apiBaseUrl}/api/analyze`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ transcript: this.activeCase.transcript })
                        });
                        if (!response.ok) throw new Error(`API 请求失败: ${response.status}`);
                        const result = await response.json();
                        if (!result.success) throw new Error(result.error || '分析失败');
                        if (result.summary) {
                            this.activeCase.summary = result.summary;
                            this.editableSummary = this.cloneSummary(result.summary);
                            this.originalSummarySnapshot = this.cloneSummary(result.summary);
                        }
                        if (result.qcReport) {
                            result.qcReport.violations = (result.qcReport.violations || []).map((v, i) => ({
                                ...v, id: `ai_v${i}`, status: 'pending'
                            }));
                            this.activeCase.qcReport = result.qcReport;
                        }
                        this.showToast('✅ AI 分析完成！小结和质检报告已更新');
                    } catch (error) {
                        this.showToast(`❌ AI 分析失败: ${error.message}`);
                    } finally {
                        this.state.analyzing = false;
                    }
                },
                async uploadAudioAndProcess() {
                    const selectedFile = this.$refs.audioUploadInput?.files?.[0];
                    if (!selectedFile) {
                        this.showToast('请先选择一个音频文件');
                        return;
                    }
                    const formData = new FormData();
                    formData.append('file', selectedFile);
                    this.state.isUploading = true;
                    try {
                        const response = await fetch(`${this.apiBaseUrl}/api/upload_audio`, {
                            method: 'POST',
                            body: formData
                        });
                        const result = await response.json();
                        if (!response.ok || !result.success) {
                            throw new Error(result.error || `上传接口失败: ${response.status}`);
                        }
                        this.showToast(`✅ 上传成功，案件 ${result.caseId} 已生成`);
                        this.$refs.audioUploadInput.value = '';
                        await this.fetchBackendCases();
                        await this.loadCase(result.caseId);
                    } catch (error) {
                        this.showToast(`❌ 上传音频失败: ${error.message}`);
                    } finally {
                        this.state.isUploading = false;
                    }
                },
                openAppealModal(violation) {
                    this.currentAppealViolation = violation;
                    this.appealReason = '';
                    this.showAppealModal = true;
                },
                closeAppealModal() {
                    this.showAppealModal = false;
                    this.currentAppealViolation = null;
                    this.appealReason = '';
                },
                submitAppeal() {
                    if (!this.appealReason.trim()) {
                        alert('请填写申诉理由');
                        return;
                    }
                    const violation = this.currentAppealViolation;
                    this.appeals.push({
                        id: `appeal_${Date.now()}`,
                        caseId: this.activeCase.caseInfo.id,
                        agentName: this.activeCase.caseInfo.agentName,
                        ruleId: violation.ruleId,
                        ruleName: violation.ruleName,
                        penalty: violation.penalty,
                        evidence: violation.evidence,
                        reason: this.appealReason.trim(),
                        status: 'pending',
                        submitTime: new Date().toLocaleString('zh-CN')
                    });
                    this.closeAppealModal();
                    this.showToast('申诉已提交,等待主管复核');
                },
                reviewAppeal(appeal, decision) {
                    appeal.status = decision;
                    appeal.reviewNote = decision === 'approved' ? '经复核,坐席说法属实,撤销扣分' : '经复核,违规属实,维持原判';
                    this.showToast(`申诉已${decision === 'approved' ? '通过' : '驳回'}`);
                },
                openSuggestionModal() {
                    const transcriptText = (this.activeCase?.transcript || []).map(line => `${line.speaker}: ${line.text}`).join('\n');
                    const summaryData = this.activeCase?.summary || {};
                    const qcReportData = this.activeCase?.qcReport || {};
                    const violations = qcReportData?.violations || [];
                    const score = qcReportData?.score ?? 0;
                    const riskLevel = summaryData?.["行动项标签"]?.["风险等级"] || '待评估';
                    const nextAction = summaryData?.["行动项标签"]?.["待办事项"] || '建议补充后续跟进动作';
                    const transcriptPreview = transcriptText.split('\n').slice(0, 4).join('\n');
                    const improvementLines = violations.length > 0
                        ? violations.map((item, index) => `${index + 1}. ${item.ruleName}：${item.suggestion || '建议补充规范开场、保持礼貌并避免强压式表达。'}`)
                        : ['1. 当前质检无明显违规，建议继续保持身份确认、录音告知和还款确认闭环。'];

                    const text = [
                        `**总体评价**`,
                        score >= 90 ? '本次通话整体较稳定，合规风险较低。' : '本次通话存在需要重点复盘的合规或沟通问题。',
                        ``,
                        `**亮点与肯定**`,
                        `- 当前风险等级：${riskLevel}`,
                        `- 当前待办事项：${nextAction}`,
                        ``,
                        `**待改进点**`,
                        ...improvementLines.map(line => `- ${line}`),
                        ``,
                        `**推荐话术**`,
                        `- 开场建议：“您好，这里是XX银行，为保证通话质量，本次通话将被录音，请问是您本人吗？”`,
                        `- 协商建议：“我理解您目前有压力，我们先确认一个您能执行的还款时间，我这边帮您做好备注。”`,
                        ``,
                        `**通话片段参考**`,
                        transcriptPreview || '暂无转录内容。'
                    ].join('\n');

                    this.suggestionHtml = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    this.showSuggestionModal = true;
                },
                addTagOption(tagKey) {
                    const newOption = prompt(`为标签 ${tagKey} 新增选项:`);
                    if (newOption && newOption.trim()) {
                        this.tagLibrary[tagKey].push(newOption.trim());
                        this.showToast('标签选项已添加');
                    }
                },
                removeTagOption(tagKey, index) {
                    if (confirm('确定要删除此标签选项吗?')) {
                        this.tagLibrary[tagKey].splice(index, 1);
                        this.showToast('标签选项已删除');
                    }
                },
                addNewRule() {
                    const ruleId = prompt('规则ID (例如: R008):');
                    const ruleName = prompt('规则名称:');
                    const description = prompt('规则描述:');
                    const penalty = parseInt(prompt('扣分值:') || '10', 10);
                    if (ruleId && ruleName && description) {
                        this.qcRules.push({ id: ruleId, name: ruleName, description, penalty, keywords: [] });
                        this.showToast('规则已添加');
                    }
                },
                editRule(index) {
                    const rule = this.qcRules[index];
                    const newPenalty = parseInt(prompt(`修改扣分值 (当前: ${rule.penalty}):`, rule.penalty) || rule.penalty, 10);
                    rule.penalty = newPenalty;
                    this.showToast('规则已更新');
                },
                deleteRule(index) {
                    if (confirm('确定要删除此规则吗?')) {
                        this.qcRules.splice(index, 1);
                        this.showToast('规则已删除');
                    }
                }
            },
            async mounted() {
                await this.fetchBackendCases();
                if (this.sortedCaseKeys.length > 0) {
                    await this.loadCase(this.sortedCaseKeys[0]);
                }
                this.currentUserName = this.currentRoleLabel;
            },
            watch: {
                'state.role'(newRole) {
                    this.currentUserName = this.roleUserMap[newRole] || '演示用户';
                }
            },
            beforeUnmount() {
                if (this.state.intervalId) {
                    clearInterval(this.state.intervalId);
                }
                if (this.audioElement) {
                    this.audioElement.pause();
                }
            }
        }).mount('#app');
    </script>
</body>

</html>
